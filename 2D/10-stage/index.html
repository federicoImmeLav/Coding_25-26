<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <button class="bottone-menu">Home</button>
        <button class="bottone-menu">Stage</button>
        <button class="bottone-menu">???</button>
    </header>

    <section id="stage">
        <div class="info">
            <h2>Nome posto stage</h2>
            <p class="testo-stage">Breve descrizione bla bla bla</p>
        </div>
        <div class="mappa">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d698.8573870907227!2d9.224547698581185!3d45.521560913385514!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4786c762d07f1f2f%3A0x99d4cd6de142eb9d!2sPiazza%20dei%20Mestieri!5e0!3m2!1sit!2sit!4v1774513553620!5m2!1sit!2sit" width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </section>

    <section id="avanzamento">
        <div class="barre">
            <div class="input"> 
                <p>Quante ore ho fatto di stage?</p>
                <input type="number" id="presenze">
                <p>Quante ore ho fatto di assenza?</p>
                <input type="number" id="assenze">
            </div>

            <button onclick="calcola()">Calcola</button>

            <div class="situazione">
                <p>Totale stage fatto</p>
                <div class="totale">
                    <div class="totale-pieno"></div>
                </div>
                <p>Assenza sul totale</p>
                <div class="assenze">
                    <div class="totale-pieno2"></div>
                </div>
            </div>
        </div>
    </section>

    <script src="./script.js"></script>
</body>
</html>
