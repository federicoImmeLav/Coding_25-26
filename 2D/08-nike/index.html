<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css">

<body>
   <div class="container-fluid fascia">
        <div class="row">

                Jordan Converse
           </div>

           <div class="col-6 text-end">
                Trova un negozio | Aiuto | Unisciti a noi | Accedi
           </div>
        </div>
   </div>
   <div class="container-fluid menu">
        <div class="row">
            <div class="col-4">
                Nike
            </div>
            <div class="col-4 text-center">
                <span>Novità</span>
                <span>Uomo</span>
                <span>Donna</span>
                <span>Kids</span>
                <span>Sport</span>
                <span>Sportswear</span>

            <div class="col-4 text-end">
                <input type="text">
                <span>cuore</span>
                <span>carrello</span>
            </div>
        </div>
   </div>

   <div class="container-fluid home">
        <div class="row">
            <div class="col-12 text-center">
                <p class="titolo">GIVE SPORT</p>
                <p class="sottotitolo">Regala il meglio per un anno di sport e di successi</p>
                <div class="pulsanti">
                    <span class="pulsante">Acquista</span>
                    <span class="pulsante">Gift card</span>
                </div>
            </div>
        </div>
   </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
