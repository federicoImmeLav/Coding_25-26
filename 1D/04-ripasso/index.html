<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripasso</title>
    <!-- Collegamento al css -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- Per distinguere gli elementi devo assegnare delle class -->
    <p class="testo1">Testo verde e in grassetto</p>
    <p class="testo2">Testo blu e in corsivo</p>
    <p class="testo3">Testo grande 30 pixel</p>

    <!-- creo un bottone -->
    <button class="bottone1">Clicca qui</button>
    
    <!-- creo un quadrato rosso che cambia 
     colore quando passo sopra il mouse -->
    <div class="quadrato"></div>

    <!-- animazione hover su testo -->
    <span class="prova">Testo che cambia colore</span>
</body>
</html>
