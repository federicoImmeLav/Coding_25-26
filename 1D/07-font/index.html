<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Collegamento con css  -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- Tre tag per il testo  -->
    <!-- Titoli vanno fino al 6 -->
    <h1>Titolo grande</h1>
    <h2>Titolo più piccolo</h2>
    <!-- Paragrafi -->
    <p>Questo è un paragrafo di testo</p>
    <!-- Span  -->
    <span>Questo è testo span</span>
    <span>Questo è un altro testo span</span>
    <!-- I paragrafi vanno a capo automaticamente
     gli span rimangono in linea  -->

    <!-- Posso cambiare diverse proprietà con il css  -->
    <p class="testo">Paragrafo di esempio</p>

    <!-- Per cambiare il font devo usare il css -->
    <p class="font1">Paragrafo di testo in Gravitas One</p>
    <p class="font2">Paragrafo di testo in Playfair</p>



</body>
</html>
