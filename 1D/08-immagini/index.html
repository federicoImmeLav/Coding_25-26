<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immagini</title>
    <!-- Collegamento con css -->
    <link rel="stylesheet" href="./style.css">

</head>
<body>
    <h1 class="titolo">Sport delle Olimpiadi</h1>
    <!-- elemento che scorre automaticamente in orizzontale -->
    <marquee behavior="" direction="">
        <h2 class="sottotitolo">Benvenuto nel sito</h2>
    </marquee>

    <h3>Curling</h3>
    <!-- Per mettere una immagine posso usare il tag img -->
    <!-- un elemento può avere più classi  -->
    <img class="immagine centro" src="./img/01.avif" alt="">

    <h3>Pattinaggio e Sci</h3>
    <!-- Per mettere immagini affiancate devo fare un contenitore
     che con display flex sistemi le immagini in orizzontale -->
    <div class="contenitore">
        <!-- Inserisco nel contenitore le due immagini -->
        <img src="./img/02.jpg" alt="" class="immagine">
        <img src="./img/03.jpg" alt="" class="immagine">
    </div>
</body>
</html>
