    <title>Header</title>
    <!-- Collegamento allo style -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- HEADER 1, logo centrale -->
    <div class="header1">
        <span>Titolo</span>
    </div>

    <!-- HEADER 2, logo a sx e pulsanti a dx -->

        <!-- creo i due gruppi che vanno ai lati della pagina -->
        <div class="logo2">Titolo</div>
        <div class="pulsanti2">
            <button>Pulsante 1</button>
            <button>Pulsante 2</button>
        </div>
    </div>

    <!-- HEADER 3, pulsanti sparsi su tutta la barra -->
    <div class="header3">
        <button>Pulsante 1</button>
        <button>Pulsante 2</button>
        <button>Pulsante 3</button>
        <button>Pulsante 4</button>
        <button>Pulsante 5</button>
