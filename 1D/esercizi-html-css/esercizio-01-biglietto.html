<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 1 – Biglietto da visita</title>
  <style>
    body {
      background-color: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Georgia, serif;
    }

    .card {
      background-color: white;
      border-radius: 16px;
      padding: 40px 50px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      text-align: center;
      width: 320px;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #4a90d9;
      margin-bottom: 16px;
    }

    .nome {
      font-size: 24px;
      font-weight: bold;
      color: #1a1a2e;
      margin: 0 0 6px 0;
    }

    .ruolo {
      font-size: 14px;
      color: #4a90d9;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 0 0 20px 0;
    }

    .divider {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 20px 0;
    }

    .info {
      font-size: 14px;
      color: #555;
      margin: 8px 0;
    }

    .bottone {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 28px;
      background-color: #4a90d9;
      color: white;
      border-radius: 30px;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
    }
  </style>
</head>
<body>
