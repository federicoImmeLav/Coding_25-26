<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 16 – Ticket Evento</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      font-family: 'Segoe UI', sans-serif;
      gap: 48px;
    }

    h1 {
      color: rgba(255,255,255,0.15);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 4px;
      text-align: center;
    }

    /* ═══════════════════════════════════
       ANIMAZIONE 1: Dissolvenza in entrata
    ═══════════════════════════════════ */

    /*
      TODO 1 → Crea il keyframe "apparisci":
               Da: opacity: 0; transform: translateY(30px)
               A:  opacity: 1; transform: translateY(0)

               @keyframes apparisci {
                 from { ... }
                 to   { ... }
               }
    */

    /* ═══════════════════════════════════
       TICKET PRINCIPALE
    ═══════════════════════════════════ */
    .ticket {
      width: 620px;
      display: flex;
      background: #1a0533;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 60px rgba(130,60,255,0.1);
      border: 1px solid rgba(180,100,255,0.2);
      position: relative;

      /*
        TODO 2 → Applica l'animazione "apparisci":
                 animation: apparisci 0.8s ease forwards
      */
    }

    /* Linea tratteggiata di separazione */
    .ticket::after {
      content: '';
      position: absolute;
      left: 380px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.1) 0px,
        rgba(255,255,255,0.1) 8px,
        transparent 8px,
        transparent 16px
      );
    }

    /* PARTE SINISTRA del ticket */
    .ticket-main {
      width: 380px;
      padding: 32px;
      flex-shrink: 0;
    }

    .ticket-categoria {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #a78bfa;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ticket-categoria::before {
      content: '';
      width: 20px;
      height: 1px;
      background: #a78bfa;
    }

    .ticket-nome {
      font-size: 28px;
      font-weight: bold;
      color: white;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .ticket-artista {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 28px;
    }

    .ticket-img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 24px;
    }

    .ticket-dettagli {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .dettaglio {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .det-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.3);
    }

    .det-valore {
      font-size: 14px;
      color: white;
      font-weight: 600;
    }

    /* PARTE DESTRA (stub) */
    .ticket-stub {
      flex: 1;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    .stub-titolo {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.3);
      text-align: center;
    }

    /* CODICE A BARRE (simulato con CSS) */
    .barcode {
      display: flex;
      gap: 2px;
      align-items: flex-end;
      height: 80px;
    }

    .barcode-bar {
      background: rgba(255,255,255,0.7);
      width: 3px;
      border-radius: 1px;
    }

    .stub-numero {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 3px;
      font-family: monospace;
    }

    .stub-seat {
      text-align: center;
    }

    .stub-seat-numero {
      font-size: 42px;
      font-weight: bold;
      color: #a78bfa;
      line-height: 1;
    }

    .stub-seat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.3);
    }


    /* ═══════════════════════════════════
       ANIMAZIONE 2: Badge "LIVE" lampeggiante
    ═══════════════════════════════════ */

    /*
      TODO 3 → Crea il keyframe "lampeggia":
               50% → opacity: 0
               (0% e 100% impliciti a opacity: 1)

               @keyframes lampeggia { ... }
    */

    .badge-live {
      background: #ef4444;
      color: white;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 2px;
      padding: 3px 10px;
      border-radius: 4px;
      text-transform: uppercase;

      /*
        TODO 4 → Applica l'animazione "lampeggia":
                 animation: lampeggia 1.2s ease-in-out infinite
      */
    }

    /* ═══════════════════════════════════
       ANIMAZIONE 3: Contatore countdown
       (simulato con CSS animation)
    ═══════════════════════════════════ */
    .countdown-container {
      text-align: center;
    }

    .countdown-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .countdown {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .countdown-block {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px 20px;
      min-width: 80px;
      text-align: center;
    }

    .countdown-num {
      font-size: 36px;
      font-weight: bold;
      color: white;
      line-height: 1;
      margin-bottom: 6px;
      font-family: monospace;

      /*
        TODO 5 → Aggiungi un'animazione "pulsa" ai numeri:
                 Prima crea il keyframe:
                 @keyframes pulsa {
                   0%, 100% { transform: scale(1); }
                   50%       { transform: scale(1.05); }
                 }
                 Poi applica: animation: pulsa 1s ease-in-out infinite
                 Ma con animation-delay diverso per ogni blocco!
                 (Usa i selettori .countdown-block:nth-child() qui sotto)
      */
    }

    .countdown-unit {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.3);
    }

    /*
      TODO 6 → Aggiungi animation-delay diversi ai 4 blocchi
               per creare un effetto a cascata:
               .countdown-block:nth-child(1) .countdown-num → delay: 0s
               .countdown-block:nth-child(2) .countdown-num → delay: 0.25s
               .countdown-block:nth-child(3) .countdown-num → delay: 0.5s
               .countdown-block:nth-child(4) .countdown-num → delay: 0.75s
    */

    /* ═══════════════════════════════════
       ANIMAZIONE 4: Sfondo stelle animate
    ═══════════════════════════════════ */

    /*
      TODO 7 → Crea il keyframe "stelle-cadono":
               from: transform: translateY(-100vh)
               to:   transform: translateY(100vh)

               Poi aggiungi le stelle nella pagina (vedi TODO 8 nell'HTML)
    */

    .stella {
      position: fixed;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0.4;
      animation: stelle-cadono linear infinite;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!--
  ╔══════════════════════════════════════════════════╗
  ║          ESERCIZIO 16 – Ticket Evento            ║
  ║              ⭐⭐⭐⭐ Livello: Alto                ║
  ╚══════════════════════════════════════════════════╝

  Una pagina di conferma acquisto ticket con
  animazioni CSS! Imparerai @keyframes e la
  proprietà animation con tutte le sue opzioni.

  📋 PROPRIETÀ "animation" (da conoscere):
  ─────────────────────────────────────────────────
  animation: nome durata timing-function delay
             iteration-count direction fill-mode;

  Esempi:
  animation: apparisci 0.5s ease forwards;
             (appare una volta e rimane visibile)

  animation: lampeggia 1s ease-in-out infinite;
             (si ripete all'infinito)

  animation-delay: 0.3s;
             (inizia dopo 0.3 secondi)
  ─────────────────────────────────────────────────

  📋 COSA FARE (CSS — 7 TODO):
  ─────────────────────────────────────────────────
  TODO 1 → @keyframes "apparisci" (fade + slide up)
  TODO 2 → Applica "apparisci" al .ticket
  TODO 3 → @keyframes "lampeggia"
  TODO 4 → Applica "lampeggia" al .badge-live
  TODO 5 → @keyframes "pulsa" + applicalo ai numeri
  TODO 6 → animation-delay diversi per i 4 blocchi
  TODO 7 → @keyframes "stelle-cadono"

  📋 COSA FARE (HTML):
  ─────────────────────────────────────────────────
  TODO 8 → Aggiungi 6 stelle animate nella pagina.
            Ogni .stella deve avere stile diverso:
            - left: diversa posizione % (es: 10%, 30%...)
            - animation-duration: diversa (4s-10s)
            - animation-delay: diverso (0s-5s)
            - top: inizia fuori schermo (-10px, -20px...)

            Esempio:
            <div class="stella" style="left:15%; top:-10px;
            animation-duration:6s; animation-delay:0s;"></div>
  ─────────────────────────────────────────────────
  💡 DIFFERENZA tra forwards e infinite:
     "forwards" → l'animazione si ferma all'ultimo frame
     "infinite" → si ripete per sempre
     "2" → si ripete 2 volte e basta
  -->

  <!-- TODO 8 → Aggiungi le stelle qui -->

  <h1>🎫 Conferma biglietto</h1>

  <!-- TICKET -->
  <div class="ticket">

    <!-- Parte sinistra -->
    <div class="ticket-main">
      <div class="ticket-categoria">
        Concerto · Milano
        <span class="badge-live">LIVE</span>
      </div>
      <h2 class="ticket-nome">Notte dei<br>Suoni</h2>
      <p class="ticket-artista">The Electric Dream Orchestra</p>

      <img class="ticket-img"
           src="https://images.unsplash.com/photo-1540039155733-5bb30b4d2d36?w=400&q=80"
           alt="Concerto">

      <div class="ticket-dettagli">
        <div class="dettaglio">
          <span class="det-label">📅 Data</span>
          <span class="det-valore">15 Apr 2026</span>
        </div>
        <div class="dettaglio">
          <span class="det-label">🕗 Orario</span>
          <span class="det-valore">21:00</span>
        </div>
        <div class="dettaglio">
          <span class="det-label">📍 Luogo</span>
          <span class="det-valore">Mediolanum Forum</span>
        </div>
        <div class="dettaglio">
          <span class="det-label">🎭 Tipo</span>
          <span class="det-valore">Gold — Pit</span>
        </div>
      </div>
    </div>

    <!-- Stub destra -->
    <div class="ticket-stub">
      <span class="stub-titolo">Ingresso</span>
      <div class="stub-seat">
        <p class="stub-seat-numero">A14</p>
        <p class="stub-seat-label">Posto</p>
      </div>
      <div class="barcode">
        <!-- Barre del codice a barre simulate -->
        <div class="barcode-bar" style="height:70%"></div>
        <div class="barcode-bar" style="height:100%"></div>
        <div class="barcode-bar" style="height:55%"></div>
        <div class="barcode-bar" style="height:90%"></div>
        <div class="barcode-bar" style="height:40%"></div>
        <div class="barcode-bar" style="height:75%"></div>
        <div class="barcode-bar" style="height:100%"></div>
        <div class="barcode-bar" style="height:60%"></div>
        <div class="barcode-bar" style="height:85%"></div>
        <div class="barcode-bar" style="height:50%"></div>
        <div class="barcode-bar" style="height:100%"></div>
        <div class="barcode-bar" style="height:70%"></div>
        <div class="barcode-bar" style="height:45%"></div>
      </div>
      <p class="stub-numero">TKT-2026-4A1X</p>
    </div>

  </div>

  <!-- COUNTDOWN -->
  <div class="countdown-container">
    <p class="countdown-label">
      <span class="badge-live" style="animation-delay:0.6s">LIVE</span>
      Manca all'evento
    </p>
    <div class="countdown">
      <div class="countdown-block">
        <div class="countdown-num">42</div>
        <div class="countdown-unit">Giorni</div>
      </div>
      <div class="countdown-block">
        <div class="countdown-num">07</div>
        <div class="countdown-unit">Ore</div>
      </div>
      <div class="countdown-block">
        <div class="countdown-num">33</div>
        <div class="countdown-unit">Min</div>
      </div>
      <div class="countdown-block">
        <div class="countdown-num">18</div>
        <div class="countdown-unit">Sec</div>
      </div>
    </div>
  </div>

</body>
</html>
