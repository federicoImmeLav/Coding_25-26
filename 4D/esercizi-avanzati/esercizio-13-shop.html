<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 13 – Shop Online</title>
  <style>
    /*
    ╔══════════════════════════════════════════════════╗
    ║   VARIABILI CSS — il "dizionario" dei colori     ║
    ╚══════════════════════════════════════════════════╝

    Le CSS Variables (o custom properties) permettono
    di definire valori riutilizzabili.
    Si dichiarano con --nome: valore;
    Si usano con: color: var(--nome);
    */
    :root {
      --primario: #ff6b35;
      --primario-scuro: #e55a24;
      --testo: #1a1a1a;
      --testo-leggero: #888;
      --sfondo: #f9f9f7;
      --card-bg: #ffffff;
      --bordo: #ececec;
      --success: #22c55e;
      --badge-nuovo: #7c6fff;
      --badge-sconto: #ff6b35;

      /*
        TODO 1 → Aggiungi una nuova variabile:
                 --ombra: 0 4px 20px rgba(0,0,0,0.08)
                 La useremo nelle card!
      */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--sfondo);
      font-family: 'Segoe UI', sans-serif;
      color: var(--testo);
      padding: 40px 20px;
    }

    /* HEADER SHOP */
    .shop-header {
      max-width: 1100px;
      margin: 0 auto 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .shop-header h1 { font-size: 28px; }
    .shop-header h1 span { color: var(--primario); }

    .header-filtri {
      display: flex;
      gap: 8px;
    }

    .chip {
      background: white;
      border: 1px solid var(--bordo);
      border-radius: 30px;
      padding: 6px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chip:hover, .chip.attivo {
      background: var(--primario);
      color: white;
      border-color: var(--primario);
    }

    /* GRIGLIA PRODOTTI */
    .prodotti-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── PRODUCT CARD ── */
    .product-card {
      background: var(--card-bg);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--bordo);

      /*
        TODO 2 → Usa la variabile --ombra per aggiungere
                 box-shadow: var(--ombra)
      */

      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    /*
      TODO 3 → Al passaggio del mouse sulla card:
               - spostala su di 6px: transform: translateY(-6px)
               - aumenta l'ombra:
                 box-shadow: 0 16px 40px rgba(0,0,0,0.14)
    */
    .product-card:hover {
    }

    /* IMMAGINE PRODOTTO */
    .product-img-container {
      position: relative;
      overflow: hidden;
      height: 220px;
      background: #f0f0ec;
    }

    .product-img-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    /*
      TODO 4 → Al passaggio del mouse sulla CARD
               (non sull'immagine), l'immagine deve
               ingrandirsi: transform: scale(1.06)

               Selettore: .product-card:hover .product-img-container img
    */

    /* BADGE PRODOTTO (es. "NUOVO", "-30%") */
    .badge {
      position: absolute;
      top: 12px;
      left: 12px;
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 4px;
      color: white;
    }

    .badge.nuovo    { background: var(--badge-nuovo); }
    .badge.sconto   { background: var(--badge-sconto); }
    .badge.esaurito { background: #888; }

    /* BOTTONE WISHLIST */
    .wishlist-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 34px;
      height: 34px;
      background: white;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      transition: transform 0.2s;
    }

    /*
      TODO 5 → Al click (o hover) sul bottone wishlist:
               transform: scale(1.2)
               Selettore: .wishlist-btn:hover
    */

    /* CORPO CARD */
    .product-body {
      padding: 16px;
    }

    .product-categoria {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--testo-leggero);
      margin-bottom: 6px;
    }

    .product-nome {
      font-size: 15px;
      font-weight: 600;
      color: var(--testo);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .product-valutazione {
      font-size: 13px;
      color: var(--testo-leggero);
      margin-bottom: 12px;
    }

    .stelle { color: #fbbf24; }

    /* PREZZI */
    .product-prezzi {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 14px;
    }

    .prezzo-attuale {
      font-size: 20px;
      font-weight: bold;
      color: var(--testo);
    }

    .prezzo-vecchio {
      font-size: 14px;
      color: var(--testo-leggero);
      text-decoration: line-through;
    }

    .risparmio {
      font-size: 12px;
      color: var(--success);
      font-weight: bold;
    }

    /* SELEZIONE COLORE */
    .colori {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }

    .colore-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }

    /*
      TODO 6 → Al passaggio del mouse sui pallini colore:
               border-color: var(--testo)
               Selettore: .colore-dot:hover
    */

    /* BOTTONE AGGIUNGI */
    .btn-aggiungi {
      width: 100%;
      background: var(--testo);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 11px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }

    /*
      TODO 7 → Al passaggio del mouse sul bottone:
               background: var(--primario)
               Selettore: .btn-aggiungi:hover
    */

    /* Prodotto esaurito */
    .product-card.esaurito .product-img-container img {
      filter: grayscale(0.8);
      opacity: 0.7;
    }

    .product-card.esaurito .btn-aggiungi {
      background: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <!--
  ╔══════════════════════════════════════════════════╗
  ║           ESERCIZIO 13 – Shop Online             ║
  ║              ⭐⭐⭐⭐ Livello: Alto                ║
  ╚══════════════════════════════════════════════════╝

  Un negozio online con card prodotto. Imparerai:
  - CSS Variables (--variabili)
  - Selettori avanzati (parent:hover > child)
  - Pseudo-classi (:hover su elementi diversi)

  📋 COSA FARE (CSS — 7 TODO):
  ─────────────────────────────────────────────────
  TODO 1 → Aggiungi la variabile --ombra in :root
  TODO 2 → Usa var(--ombra) nella .product-card
  TODO 3 → Hover sulla card: translateY + ombra
  TODO 4 → Hover card → zoom immagine (selettore composto)
  TODO 5 → Hover wishlist: scale(1.2)
  TODO 6 → Hover pallini colore: bordo scuro
  TODO 7 → Hover bottone aggiungi: background arancione

  📋 COSA FARE (HTML — 2 TODO):
  ─────────────────────────────────────────────────
  TODO 8 → Aggiungi un QUINTO prodotto a scelta.
            Deve avere badge "NUOVO", 3 colori,
            prezzo e valutazione inventati da te.

  TODO 9 → Modifica il valore della variabile
            --primario in :root con un colore
            diverso (es. #e63946 o #2563eb) e
            osserva come cambia l'intera pagina!
  ─────────────────────────────────────────────────
  💡 COSA SONO le CSS Variables?
     Definisci UNA VOLTA: --primario: #ff6b35;
     Usi ovunque: color: var(--primario);
     Se vuoi cambiare il colore principale, lo
     cambi SOLO in :root e si aggiorna tutto!
  -->

  <div class="shop-header">
    <h1>Urban<span>Shop</span></h1>
    <div class="header-filtri">
      <button class="chip attivo">Tutti</button>
      <button class="chip">Scarpe</button>

      <button class="chip">Accessori</button>

  <div class="prodotti-grid">

    <!-- Prodotto 1 -->
    <div class="product-card">

      </div>

        <div class="colori">

          <div class="colore-dot" style="background:#ff6b35"></div>
        </div>

      </div>
    </div>

    <!-- Prodotto 2 (con sconto) -->
    <div class="product-card">
      <div class="product-img-container">
        <img src="https://picsum.photos/seed/jacket2/300/220" alt="Giacca">
        <span class="badge sconto">−30%</span>
        <button class="wishlist-btn">🤍</button>
      </div>
      <div class="product-body">

          <span class="risparmio">Risparmi €36</span>
        </div>
        <div class="colori">
          <div class="colore-dot" style="background:#4a4a6a"></div>
          <div class="colore-dot" style="background:#8B4513"></div>
          <div class="colore-dot" style="background:#2d5a27"></div>
        </div>
        <button class="btn-aggiungi">+ Aggiungi al carrello</button>

    </div>

    <!-- Prodotto 3 (esaurito) -->
    <div class="product-card esaurito">
      <div class="product-img-container">
        <img src="https://picsum.photos/seed/bag3/300/220" alt="Borsa">

      </div>
      <div class="product-body">

        <div class="colori">

    </div>

    <!-- Prodotto 4 -->
    <div class="product-card">
      <div class="product-img-container">
        <img src="https://picsum.photos/seed/hat4/300/220" alt="Cappello">
        <button class="wishlist-btn">🤍</button>
      </div>
      <div class="product-body">
        <p class="product-categoria">Accessori</p>
        <h3 class="product-nome">Bucket Hat Streetwear</h3>

        <div class="colori">

          <div class="colore-dot" style="background:#c0392b"></div>
          <div class="colore-dot" style="background:#1a1a1a"></div>
        </div>
        <button class="btn-aggiungi">+ Aggiungi al carrello</button>
      </div>
    </div>

    <!-- TODO 8 → Aggiungi qui il quinto prodotto -->

  </div>

</body>
</html>
